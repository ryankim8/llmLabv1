name: doctests

on: [push]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install groq python-dotenv pytest coverage

      - name: Run doctests with coverage
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          coverage run -m pytest chat.py --doctest-modules
          coverage report -m